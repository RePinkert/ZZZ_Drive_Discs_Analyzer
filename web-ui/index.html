<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>绝区零驱动盘分析器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d9ff, #ff6b9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #888;
            font-size: 0.9rem;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .search-box {
            flex: 1;
            min-width: 200px;
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            border: 2px solid #333;
            border-radius: 8px;
            background: #0d0d1a;
            color: #fff;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #00d9ff;
        }
        
        .search-box::after {
            content: '🔍';
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.5;
        }
        
        .mode-toggle {
            display: flex;
            background: #0d0d1a;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #333;
        }
        
        .mode-toggle button {
            padding: 12px 20px;
            border: none;
            background: transparent;
            color: #888;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s;
        }
        
        .mode-toggle button.active {
            background: #00d9ff;
            color: #000;
            font-weight: 600;
        }
        
        .mode-toggle button:hover:not(.active) {
            background: #1a1a3e;
        }
        
        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            border: 1px solid #333;
        }
        
        .stat-card .number {
            font-size: 2rem;
            font-weight: bold;
            color: #00d9ff;
        }
        
        .stat-card .label {
            font-size: 0.85rem;
            color: #888;
            margin-top: 5px;
        }
        
        .sets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .set-card {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #333;
            transition: all 0.3s;
        }
        
        .set-card:hover {
            border-color: #00d9ff;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,217,255,0.1);
        }
        
        .set-card.hidden {
            display: none;
        }
        
        .set-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .set-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #fff;
        }
        
        .agent-count {
            background: #00d9ff;
            color: #000;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .agents-list {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }
        
        .agents-list span {
            display: inline-block;
            background: rgba(255,107,157,0.2);
            color: #ff6b9d;
            padding: 2px 8px;
            border-radius: 4px;
            margin: 2px;
            font-size: 0.8rem;
        }
        
        .slot-section {
            margin-bottom: 12px;
        }
        
        .slot-title {
            font-size: 0.8rem;
            color: #00d9ff;
            margin-bottom: 5px;
            font-weight: 600;
        }
        
        .stats-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .stat-tag {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            background: rgba(255,255,255,0.1);
            color: #ccc;
        }
        
        .stat-tag.unused {
            background: rgba(255,100,100,0.2);
            color: #ff8888;
            text-decoration: line-through;
            opacity: 0.7;
        }
        
        .stat-tag.highlight {
            background: rgba(0,217,255,0.3);
            color: #00d9ff;
            border: 1px solid #00d9ff;
        }
        
        .no-data {
            color: #666;
            font-style: italic;
            font-size: 0.85rem;
        }
        
        footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #333;
            color: #666;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>绝区零驱动盘分析器</h1>
            <p class="subtitle">ZZZ Drive Disc Analyzer</p>
        </header>
        
        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索套装或代理人...">
            </div>
            <div class="mode-toggle">
                <button id="modeUsed" class="active">正向统计</button>
                <button id="modeInverse">反选分析</button>
            </div>
        </div>
        
        <div class="stats-overview" id="statsOverview"></div>
        
        <div class="sets-grid" id="setsGrid"></div>
        
        <footer>
            数据来源: zenlesszonezero.csv | 截至版本: 微光引灯时
        </footer>
    </div>
    
    <script type="module" src="dist/app.js"></script>
</body>
</html>
